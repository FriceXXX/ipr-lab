apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload
                operator: In
                values:
                - app
      containers:
      - name: user-service
        image: mablinov2704/user-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: HTTP_PORT
          value: "8081"
        - name: DB_DSN
          value: "postgres://messenger:secret@postgres:5432/users_db?sslmode=disable"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
  - name: http
    port: 8081
    targetPort: 8081
    protocol: TCP