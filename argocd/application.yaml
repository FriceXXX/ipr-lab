apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: messenger-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FriceXXX/ipr-lab
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: messenger-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true